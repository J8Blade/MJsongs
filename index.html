<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Button</title>
    <!-- Import Roboto font from Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Setup full screen white background and center content */
        body {
            background-color: #ffffff;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Roboto', sans-serif;
        }

        /* Styling for the big, pretty white download button */
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background-color: #ffffff;
            color: #1f2937; /* Dark charcoal text for contrast */
            font-size: 20px;
            font-weight: 500;
            padding: 18px 40px;
            border: none;
            border-radius: 50px; /* Fully rounded pill shape */
            cursor: pointer;
            text-decoration: none;
            
            /* Soft, modern premium depth shadow to stand out on the white background */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08), 
                        0 4px 12px rgba(0, 0, 0, 0.04);
            
            /* Smooth animation transitions */
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), 
                        box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1),
                        background-color 0.2s;
        }

        /* Subtle lift hover effect */
        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.12), 
                        0 6px 16px rgba(0, 0, 0, 0.06);
            background-color: #fcfcfc;
        }

        /* Press down effect when clicked */
        .download-btn:active {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
            background-color: #f5f5f5;
        }

        /* Clean SVG icon style */
        .download-icon {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

    <!-- The download attribute forces the browser to save the file as MJsongs.zip -->
    <a href="MJsongs.zip" download="MJsongs.zip" class="download-btn">
        <!-- Minimalist inline SVG download icon -->
        <svg class="download-icon" viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Download Pack
    </a>

</body>
</html>
